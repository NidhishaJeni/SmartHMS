{% extends "base.html" %}
{% block title %}AI Visit{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-8">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h1 class="h5 mb-2 text-primary">AI Risk Prediction Visit</h1>
        <p class="text-muted small mb-3">
          Enter your latest clinical values to run SmartHMS diabetes risk prediction using a pre-trained model (or intelligent heuristic).
        </p>
        <form method="post" class="row g-3" novalidate>
          <div class="col-md-3">
            <label class="form-label">Pregnancies</label>
            <input type="number" name="pregnancies" class="form-control" min="0" value="0" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Glucose</label>
            <input type="number" step="0.1" name="glucose" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Blood Pressure</label>
            <input type="number" step="0.1" name="blood_pressure" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Skin Thickness</label>
            <input type="number" step="0.1" name="skin_thickness" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Insulin</label>
            <input type="number" step="0.1" name="insulin" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">BMI</label>
            <input type="number" step="0.1" name="bmi" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">DPF</label>
            <input type="number" step="0.001" name="dpf" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" min="0" required>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Run Prediction</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
