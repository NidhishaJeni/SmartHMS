{% extends "base.html" %}
{% block title %}Patient Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <h1 class="h5 mb-3 text-primary">
          {% if patient %}Update{% else %}Create{% endif %} Patient Profile
        </h1>
        <form method="post" novalidate>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" value="{{ patient.full_name if patient else '' }}" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" name="age" value="{{ patient.age if patient else '' }}" class="form-control" min="0" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select" required>
              <option value="" disabled {% if not patient %}selected{% endif %}>Select gender</option>
              <option value="Male" {% if patient and patient.gender == 'Male' %}selected{% endif %}>Male</option>
              <option value="Female" {% if patient and patient.gender == 'Female' %}selected{% endif %}>Female</option>
              <option value="Other" {% if patient and patient.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" value="{{ patient.phone if patient else '' }}" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea name="address" rows="3" class="form-control">{{ patient.address if patient else '' }}</textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            {% if patient %}Update Profile{% else %}Create Profile{% endif %}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
